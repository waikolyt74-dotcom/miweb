<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Games</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
}

header{
    background:#1e1e1e;
    padding:20px;
    text-align:center;
}

h1{
    margin:0;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.game{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
}

.game:hover{
    transform:scale(1.05);
}

.game img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.game h2{
    margin:10px;
}

.play{
    display:inline-block;
    margin:10px;
    padding:10px 20px;
    background:#00cc66;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
    <h1>🎮 DS Games 🎮</h1>
    <p>Mis juegos favoritos</p>
</header>

<div class="games">

    <div class="game">
        <img src="https://tr.rbxcdn.com/default/LandscapeImage/Png" alt="">
        <h2>Mi Juego Roblox</h2>
        <a class="play" href="https://www.roblox.com/" target="_blank">Jugar</a>
    </div>

    <div class="game">
        <img src="https://tr.rbxcdn.com/default/LandscapeImage/Png" alt="">
        <h2>Parkour Game</h2>
        <a class="play" href="https://www.roblox.com/" target="_blank">Jugar</a>
    </div>

    <div class="game">
        <img src="https://tr.rbxcdn.com/default/LandscapeImage/Png" alt="">
        <h2>Battle Game</h2>
        <a class="play" href="https://www.roblox.com/" target="_blank">Jugar</a>
    </div>

</div>

</body>
</html>
