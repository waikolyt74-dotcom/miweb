<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Fire 2D - Base</title>
  <style>
    body { margin: 0; background: #111; overflow: hidden; }
    canvas { display: block; background: #333; margin: auto; border: 2px solid white; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Personaje
    let player = {
      x: 400,
      y: 300,
      width: 30,
      height: 30,
      speed: 5,
      color: 'lime',
    };

    // Variables para movimiento
    let keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // Disparos
    let bullets = [];

    document.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // Dirección del disparo
      const dx = mouseX - (player.x + player.width / 2);
      const dy = mouseY - (player.y + player.height / 2);
      const length = Math.sqrt(dx * dx + dy * dy);

      // Normalizamos
      const speed = 7;
      bullets.push({
        x: player.x + player.width / 2,
        y: player.y + player.height / 2,
        dx: (dx / length) * speed,
        dy: (dy / length) * speed,
        radius: 5,
      });
    });

    function update() {
      // Movimiento del jugador
      if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
      if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
      if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
      if (keys['d'] || keys['ArrowRight']) player.x += player.speed;

      // Limitar el personaje dentro del canvas
      if (player.x < 0) player.x = 0;
      if (player.y < 0) player.y = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

      // Actualizar posiciones de las balas
      for (let i = 0; i < bullets.length; i++) {
        bullets[i].x += bullets[i].dx;
        bullets[i].y += bullets[i].dy;
      }

      // Limitar balas fuera de pantalla
      bullets = bullets.filter(bullet => bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height);
    }

    function draw() {
      // Limpiar canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Dibujar jugador
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Dibujar balas
      ctx.fillStyle = 'yellow';
      bullets.forEach(bullet => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
